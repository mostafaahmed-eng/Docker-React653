services:
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=postgres
  redis:
    image: redis:latest
  nginx:
    depends_on:
      - api
      - client    
    restart: always
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "3050:80"  
  api:
    restart: always   
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - /app/node_modules
      - ./server:/app     
    environment:
       - NODE_ENV=development
       - PORT=5000
       - PGHOST=postgres
       - PGPORT=5432
       - PGUSER=postgres
       - PGPASSWORD=postgres_password
       - PGDATABASE=postgres
       - REDIS_HOST=redis
       - REDIS_PORT=6379
  client:
    restart: always 
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - /app/node_modules
      - ./client:/app
  worker:
    restart: always 
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - /app/node_modules
      - ./worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379      