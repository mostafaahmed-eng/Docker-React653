name: Deploy react

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t mostafaanwar862004/react-test -f Dockerfile.dev .

      - run: docker run -e CI=true mostafaanwar862004/react-test npm run test
      
      - run: docker build -t mostafaanwar862004/multi-client -f .microservices/Client
      - run: docker build -t mostafaanwar862004/multi-server -f .microservices/Server
      - run: docker build -t mostafaanwar862004/multi-nginx -f .microservices/Nginx
      - run: docker build -t mostafaanwar862004/multi-worker -f .microservices/Worker

      - run: docker push mostafaanwar862004/multi-client
      - run: docker push mostafaanwar862004/multi-server
      - run: docker push mostafaanwar862004/multi-nginx
      - run: docker push mostafaanwar862004/multi-worker

