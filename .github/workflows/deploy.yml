name: Deploy react

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t mostafaanwar862004/react-test -f Dockerfile.dev .

      - name: Run tests
        run: docker run -e CI=true mostafaanwar862004/react-test npm run test

      - name: Create deployment package
        run: zip -r deploy.zip . -x '*.git*'

      - name: Deploy over AWS using EB services
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: Mostafa
          environment_name: mostafa-env
          version_label: github-${{ github.sha }}
          region: us-east-1
          deployment_package: deploy.zip

