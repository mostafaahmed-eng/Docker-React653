name: Deploy react

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t mostafaanwar862004/react-test -f Dockerfile.dev .

      - name: Run tests
        run: docker run -e CI=true mostafaanwar862004/react-test npm run test
      
      - name: Build images to Docker Hub
        run: docker build -t mostafaanwar862004/multi-client ./client
        run: docker build -t mostafaanwar862004/multi-nginx ./nginx
        run: docker build -t mostafaanwar862004/multi-server ./server
        run: docker build -t mostafaanwar862004/multi-worker ./worker
       
      - name: Push to Docker Hub 
        run: docker push mostafaanwar862004/multi-client
        run: docker push mostafaanwar862004/multi-nginx
        run: docker push mostafaanwar862004/multi-server
        run: docker push mostafaanwar862004/multi-worker

